<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Login | WasteGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand section-title" href="index.html">WasteGuard</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link">Resident Portal</span>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-card">
                    <h2 class="text-center mb-4">Resident Login</h2>
                    
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Door Number</label>
                            <input type="text" class="form-control" id="doorNumber" required placeholder="e.g. 101">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required placeholder="your@email.com">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                    </form>
                    
                    <div id="loginResult" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const doorNumber = document.getElementById('doorNumber').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('loginResult');
            
            resultDiv.innerHTML = '<div class="spinner-border text-primary"></div> Logging in...';
            
            try {
                const response = await fetch(`${API_BASE}/resident/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ doorNumber, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    resultDiv.innerHTML = '<div class="alert alert-success">✅ Login successful! Redirecting...</div>';
                    setTimeout(() => {
                        window.location.href = `resident_dashboard.html?door=${doorNumber}&name=${encodeURIComponent(data.name)}`;
                    }, 1500);
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger">❌ ${data.error || 'Login failed'}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="alert alert-danger">❌ Network error. Please try again.</div>';
            }
        });
    </script>
</body>
</html>
