<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Dashboard | WasteGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand section-title" href="index.html">WasteGuard</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link">Worker Mode</span>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <!-- Notifications Column -->
            <div class="col-md-4">
                <h3 class="mb-4">Notifications</h3>
                <div id="notificationsContainer">
                    <!-- Notifications will be injected here -->
                    <p class="text-secondary">No pending alerts.</p>
                </div>
            </div>

            <!-- Report Form Column -->
            <div class="col-md-8">
                <div class="glass-card">
                    <h2 class="mb-4">Report Mixed Waste</h2>
                    <form id="uploadForm">
                        <div class="mb-3">
                            <label class="form-label">Resident Name</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary"
                                id="residentName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Door Number</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="doorNumber"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Waste Type</label>
                            <select class="form-select bg-dark text-white border-secondary" disabled>
                                <option selected>Mixed Waste</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Upload Photo Evidence</label>
                            <input type="file" class="form-control bg-dark text-white border-secondary" id="photo"
                                accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-premium w-100 mt-3">Upload Report</button>
                    </form>
                    <div id="statusMessage" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';

        // Load Notifications
        async function fetchNotifications() {
            try {
                const res = await fetch(`${API_BASE}/worker-notifications`);
                const data = await res.json();
                const container = document.getElementById('notificationsContainer');

                if (data.length > 0) {
                    container.innerHTML = data.map(notif => `
                        <div class="tamil-alert">
                            ⚠️ <strong>கவனம்:</strong> குடியிருப்பாளர் ${notif.name} (கதவு எண்: ${notif.door_number}) இன்னும் அபராதத்தை செலுத்தவில்லை.
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-secondary text-center py-3">No pending alerts.</p>';
                }
            } catch (err) {
                console.error('Failed to fetch notifications');
            }
        }

        // Handle Form Submission
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('residentName', document.getElementById('residentName').value);
            formData.append('doorNumber', document.getElementById('doorNumber').value);
            formData.append('photo', document.getElementById('photo').files[0]);

            const status = document.getElementById('statusMessage');
            status.innerHTML = '<div class="spinner-border text-primary" role="status"></div> Uploading...';

            try {
                const res = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                if (result.success) {
                    status.innerHTML = `<div class="alert alert-success mt-2">✅ Success: ${result.message}</div>`;
                    document.getElementById('uploadForm').reset();
                } else {
                    status.innerHTML = `<div class="alert alert-danger mt-2">❌ Error: ${result.error}</div>`;
                }
            } catch (err) {
                status.innerHTML = `<div class="alert alert-danger mt-2">❌ Failed to connect to server.</div>`;
            }
        });

        // Polling for notifications every 10 seconds
        fetchNotifications();
        setInterval(fetchNotifications, 10000);
    </script>
</body>

</html>
