<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Dashboard | WasteGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .qr-section img {
            max-width: 200px;
            border-radius: 10px;
            border: 5px solid white;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand section-title" href="index.html">WasteGuard</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link">Resident Portal</span>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <!-- Token-based Access Section -->
                <div class="glass-card mb-4">
                    <h3 class="mb-3">Your Dashboard</h3>
                    <div id="residentInfo" class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2">Loading your information...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <!-- Login/Search Section -->
                <div class="glass-card mb-4">
                    <h3 class="mb-3">Check Your Status</h3>
                    <div class="mb-3">
                        <label class="text-white mb-2">Name</label>
                        <div class="input-group">
                            <input type="text" id="searchName" class="form-control bg-dark text-white border-secondary"
                                placeholder="Enter Your Name">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="text-white mb-2">Door No</label>
                        <div class="input-group">
                            <input type="text" id="searchDoor" class="form-control bg-dark text-white border-secondary"
                                placeholder="Enter Door Number (e.g. 101)">
                            <button class="btn btn-premium" onclick="checkStatus()">Search</button>
                        </div>
                    </div>
                </div>

                <!-- Status Display -->
                <div id="statusResult" style="display: none;">
                    <div class="glass-card text-center">
                        <h2 id="residentNameDisplay" class="mb-4">Welcome</h2>

                        <div id="warningContainer" class="mb-4">
                            <!-- Warnings will appear here -->
                        </div>

                        <div id="fineContainer" style="display: none;" class="mt-4">
                            <div class="danger-badge mb-3 d-inline-block">Fine Imposed: ₹500</div>
                            <p class="text-warning">Status: <strong id="paymentStatus">Pending</strong></p>

                            <div class="qr-section my-4">
                                <p>Scan this QR to Pay Head</p>
                                <img id="paymentQR" src="" alt="Payment QR">
                            </div>

                            <button id="payBtn" class="btn btn-premium w-100" onclick="processPayment()">Pay
                                Now</button>
                        </div>

                        <div id="successMessage" style="display: none;" class="alert alert-success mt-3">
                            Payment Successful! Your warnings have been reset.
                        </div>
                    </div>
                </div>

                <div id="noDataResult" style="display: none;" class=" glass-card text-center text-secondary py-5">
    <script>
        const API_BASE = 'http://localhost:5000/api';
        let currentResident = null;

        // Parse URL parameters for token-based access
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                door: params.get('door'),
                token: params.get('token')
            };
        }

        // Load resident data using token
        async function loadResidentData() {
            const { door, token } = getUrlParams();
            
            if (!door || !token) {
                document.getElementById('residentInfo').innerHTML = 
                    '<div class="alert alert-danger">Invalid access link. Please check your email for the correct link.</div>';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/resident/validate?door=${door}&token=${token}`);
                if (!res.ok) {
                    throw new Error('Invalid token');
                }

                const data = await res.json();
                currentResident = data;
                displayResidentInfo(data);
            } catch (err) {
                console.error(err);
                document.getElementById('residentInfo').innerHTML = 
                    '<div class="alert alert-danger">Access denied. Your link may have expired or is invalid.</div>';
            }
        }

        // Display resident information
        function displayResidentInfo(data) {
            const warningContainer = document.getElementById('warningContainer');
            let html = `
                <h4>Hello, ${data.name}</h4>
                <p class="text-muted">Door Number: ${data.door_number}</p>
                <div class="mt-4">
            `;

            // Logic thresholds
            if (data.fine_status === 'Pending') {
                html += `
                    <div class="alert alert-danger">
                        <strong>💳 Fine Imposed: ₹500</strong><br>
                        Status: Pending
                    </div>
                    <div class="qr-section my-4">
                        <p>Scan this QR to Pay Head</p>
                        <img src="${data.qrCodeData}" alt="Payment QR" style="max-width: 200px; border-radius: 10px; border: 5px solid white;">
                    </div>
                    <button class="btn btn-premium w-100" onclick="processPayment()">Pay Now</button>
                `;
            } else if (data.fine_status === 'Paid') {
                html += '<div class="alert alert-success"><strong>✅ Status: All Clear</strong><br>Payment received - warnings reset</div>';
            } else if (data.strict_warning) {
                html += '<div class="alert alert-warning"><strong>🚨 FINAL WARNING</strong><br>Next violation = ₹500 fine</div>';
            } else if (data.warning_count === 1) {
                html += '<div class="alert alert-info"><strong>⚠ Warning Level: 1/2</strong><br>Please follow waste segregation guidelines</div>';
            } else if (data.warning_count === 2) {
                html += '<div class="alert alert-warning"><strong>⚠ Warning Level: 2/2</strong><br>Next violation will be escalated to Head</div>';
            } else if (data.warning_count === 3) {
                html += '<div class="alert alert-danger"><strong>🚨 3rd Violation Recorded</strong><br>Under review by Head</div>';
            } else {
                html += '<div class="alert alert-success"><strong>✅ No Active Warnings</strong><br>Keep up the good work!</div>';
            }

            html += '</div>';
            document.getElementById('residentInfo').innerHTML = html;
        }

        // Process fine payment
        async function processPayment() {
            if (!currentResident) return;
            
            const { door, token } = getUrlParams();
            const payBtn = document.querySelector('button[onclick="processPayment()"]');
            payBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
            payBtn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/resident/pay-fine?door=${door}&token=${token}`, { method: 'POST' });
                const result = await res.json();
                if (result.success) {
                    // Reload data to show updated status
                    await loadResidentData();
                } else {
                    throw new Error('Payment failed');
                }
            } catch (err) {
                console.error(err);
                alert('Payment failed. Please try again.');
                payBtn.innerHTML = 'Pay Now';
                payBtn.disabled = false;
            }
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadResidentData);
    </script>
</body>

</html>
